<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow col-md-4 mx-auto">
        <h3 class="text-center">Edit Student</h3>

        <form method="POST">
            <input type="text" name="name" value="{{ student[1] }}" class="form-control mb-3">
            <input type="email" name="email" value="{{ student[2] }}" class="form-control mb-3">
            <input type="text" name="course" value="{{ student[3] }}" class="form-control mb-3">
            <button class="btn btn-warning w-100">Update</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
